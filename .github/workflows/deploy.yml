name: Deploy Workflow

# This workflow is manual-only to avoid failures when secrets are not configured.
# Configure the required secrets before enabling automatic triggers:
#   - HEROKU_API_KEY: Heroku API key
#   - RENDER_API_KEY: Render API key
#   - GITHUB_TOKEN: Automatically provided by GitHub Actions
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            client/node_modules
            server/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      # Example: Deploy to Heroku
      # Requires HEROKU_API_KEY secret to be configured
      - name: Deploy to Heroku
        if: false
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: "your-heroku-app-name"
          heroku_email: "your-email@example.com"

      # Example: Deploy to Render
      # Requires RENDER_API_KEY secret to be configured
      - name: Deploy to Render
        if: false
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json" \
          https://api.render.com/deploy/srv-xxxx

      # Example: Deploy to GitHub Pages (Vue frontend)
      - name: Build Vue project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
