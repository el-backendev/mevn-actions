name: Deploy Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # cname: your-custom-domain.com  # Uncomment and set your custom domain
          force_orphan: true

  deploy-heroku:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && vars.ENABLE_HEROKU_DEPLOY == 'true'
    environment:
      name: heroku-production
      url: https://${{ vars.HEROKU_APP_NAME }}.herokuapp.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ vars.HEROKU_APP_NAME }}
          heroku_email: ${{ vars.HEROKU_EMAIL }}

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && vars.ENABLE_RENDER_DEPLOY == 'true'
    environment:
      name: render-production
    steps:
      - name: Trigger Render Deploy
        run: |
          response=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/deploy/${{ vars.RENDER_SERVICE_ID }})
          echo "Deploy response: $response"

  notify:
    name: Notify Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy-pages, deploy-heroku, deploy-render]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "🚀 Deploy completed!"
          echo "Pages: ${{ needs.deploy-pages.result }}"
          echo "Heroku: ${{ needs.deploy-heroku.result }}"
          echo "Render: ${{ needs.deploy-render.result }}"
